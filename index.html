<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SISGEVA - Sistema de Gerenciamento de Vacinas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>SISGEVA</h1>
    <button onclick="toggleTheme()">☀️ / 🌙</button>
  </header>

  <!-- TELA INICIAL (LOGIN) -->
  <main id="login">
    <h2>Acesso ao Sistema</h2>

    <label for="user">Usuário</label>
    <input type="text" id="user" placeholder="Digite seu usuário">

    <label for="pass">Senha</label>
    <input type="password" id="pass" placeholder="Digite sua senha">

    <p id="login-error"></p>

    <button onclick="login()">Entrar</button>
  </main>

  <!-- TELA MAIN (SISTEMA) -->
  <div id="sistema" style="display:none;">
    <nav>
      <button onclick="mostrarTela('cadastroPaciente')">👤 Cadastrar</button>
      <button onclick="mostrarTela('listaPaciente')">📋 Pacientes</button>
      <button onclick="mostrarTela('vacinas')">💉 Vacinas</button>
      <button onclick="logout()">🚪 Sair</button>
    </nav>

    <!-- TELA 1 - CADASTRO DE PACIENTE -->
    <section id="cadastroPaciente" class="tela">
      <h2>Cadastrar Pacientes</h2>

      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Nome Completo">

      <label for="idade">Idade</label>
      <input type="text" id="idade" placeholder="Ex 25">

      <button onclick="cadastrarPaciente()">Cadastrar</button>
    </section>

    <!-- TELA 3 - LISTA DE PACIENTES -->
    <section id="listaPaciente" class="tela">
      <h2>Paceintes</h2>
      <ul id="listaPacientes"></ul>
    </section>

    <!-- TELA 3 - VACINAS -->
    <section id="vacinas" class="tela">
      <h2>Vacinas</h2>

      <label for="pacientesSelect">Paciente</label>
      <select id="pacienteSelect" onchange="verVacinas(this.value)"></select>

      <label for="vacinaNome">Vacina</label>
      <input type="text" id="vacinaNome" placeholder="Ex: Influenza">

      <label for="dataVacina">Data</label>
      <input type="date" id="dataVacina">

      <button onclick="aplicarVacina()">Aplicar</button>

      <div id="areaVacinas"></div>
    </section>
  </div>
  
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pacientes.js"></script>
  <script src="js/vacinas.js"></script>
  <script src="js/ui.js"></script>

  <script>
    
    // INICIALIZA O STORAGE 
    initStorage();

    //LOGOUT
    function logout() {
      document.getElementById('sistema').style.display = 'none'
      document.getElementById('login').style.display = 'block'
    }

    function login() {
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;

      if (user === 'admin' && pass === '123') {
        document.getElementById('login').style.display = 'none';
        document.getElementById('sistema').style.display = 'block';
        mostrarTela('listaPaciente');
      } else {
        document.getElementById('login-error').textContent = '⚠️ Usuário ou senha inválidos.'
      }
    }
  </script>
  
</body>
</html>

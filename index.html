<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SISGEVA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>SISGEVA</h1>

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- SISTEMA -->
  <div id="sistema" style="display:none;">
    <h2>Cadastro de Paciente</h2>

    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="idade" placeholder="Idade">
    <button onclick="cadastrarPaciente()">Cadastrar</button>

    <h3>Pacientes</h3>
    <ul id="listaPacientes"></ul>

    <h2>Registrar Vacinas</h2>

    <select id="pacienteSelect"></select>
    <input type="text" id="vacinaNome" placeholder="Nome da vacina">
    <input type="text" id="dose" placeholder="Dose (1ª, 2ª, reforço)">
    <input type="text" id="profissional" placeholder="Profissional responsável">
    <button onclick="aplicarVacina()">Aplicar</button>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pacientes.js"></script>
  <script src="js/vacinas.js"></script>

  <script>
    initStorage();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SISGEVA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <section id="loginScreen" class="screen">
    <h2>SISGEVA - Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </section>

  <!-- DASHBOARD -->
  <section id="mainScreen" class="screen hidden">
    <h2>Painel SISGEVA</h2>
    <h3>Pacientes cadastrados</h3>
    <ul id="listaPacientes"></ul>

    <button onclick="abrirModal()">Cadastrar Paciente</button>
  </section>

  <!-- MODAL -->
  <div id="modalPaciente" class="modal hidden">
    <div class="modal-content">
      <h3>Novo Paciente</h3>
      <input type="text" id="nomePaciente" placeholder="Nome do paciente">
      <button onclick="salvarPaciente()">Salvar</button>
      <button onclick="fecharModal()">Fechar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SISGEVA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>SISGEVA</h1>

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- SISTEMA -->
  <div id="sistema" style="display:none;">

    <!-- MENU -->
    <div id="menu">
      <button onclick="mostrarTela('cadastroPaciente')">Cadastrar Paciente</button>
      <button onclick="mostrarTela('listaPaciente')">Ver Pacientes</button>
      <button onclick="mostrarTela('vacinas')">Vacinas</button>
    </div>

    <!-- TELA 1 -->
    <div id="cadastroPaciente" class="tela">
      <h2>Cadastro de Paciente</h2>
      <input type="text" id="nome" placeholder="Nome">
      <input type="number" id="idade" placeholder="Idade">
      <button onclick="cadastrarPaciente()">Cadastrar</button>
    </div>

    <!-- TELA 2 -->
    <div id="listaPaciente" class="tela">
      <h2>Pacientes</h2>
      <ul id="listaPacientes"></ul>
    </div>

    <!-- TELA 3 -->
    <div id="vacinas" class="tela">
      <h2>Vacinas</h2>

      <select id="pacienteSelect" onchange="verVacina(this.value)"></select>
      <input type="text" id="vacinaNome" placeholder="Nome da vacina">
      <input type="text" id="dose" placeholder="Dose (ex: 1ª dose)">
      <input type="date" id="dataVacina">
      <input type="text" id="profissional" placeholder="Profissional">
      <input type="text" id="lote" placeholder="Lote da vacina">
      <textarea id="observacoes" placeholder="Observações (opcional)"></textarea>

      <button onclick="aplicarVacina()">Aplicar</button>

      <h3>Histórico</h3>
      <div id="areaVacinas"></div>
    </div>

  </div>

  <!--Ordem dos scripts (ui sempre por ultimo)-->
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pacientes.js"></script>
  <script src="js/vacinas.js"></script>
  <script src="js/ui.js"></script>

  <script>
    initStorage();
  </script>

</body>
</html>
